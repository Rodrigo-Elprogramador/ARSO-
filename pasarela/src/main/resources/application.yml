server:
  port: 8080

zuul:
  routes:
    usuarios:
      path: /api/usuarios/**
      url: ${USUARIOS_ROUTE_URL:http://localhost:8081/api/usuarios}
    productos:
      path: /api/productos/**
      url: ${PRODUCTOS_ROUTE_URL:http://localhost:8082/api/productos}
    compraventas:
      path: /api/compraventas/**
      url: ${COMPRAVENTAS_ROUTE_URL:http://localhost:8083/api/compraventas}
  sensitive-headers: ""

spring:
  security:
    oauth2:
      client:
        registration:
          github:
            clientId: ${GITHUB_CLIENT_ID:docker-local-client-id}
            clientSecret: ${GITHUB_CLIENT_SECRET:docker-local-client-secret}

jwt:
  secret: clave

usuarios:
  base-url: ${USUARIOS_BASE_URL:http://localhost:8081/api/}
